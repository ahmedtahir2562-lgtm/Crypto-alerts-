name: Crypto Volatility Watch

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run alert check
        env:
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python alert_check.py

      - name: Save alert cooldowns
        run: |
          git config user.name "crypto-bot"
          git config user.email "crypto-bot@users.noreply.github.com"
          git add alert_cooldown.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update alert cooldowns"
          git push
